procs:
    urls:
        shell: node --no-warnings scripts/dev-urls.mjs
        autostart: true
        autorestart: false
    pkg:
        shell: pnpm -w -r --filter @humanspeak/svelte-headless-table run dev:pkg
    dev:
        shell: pnpm -w run dev
    docs:
        shell: rm -rf docs/.svelte-kit docs/node_modules/.vite && pnpm --filter docs run dev
    doc-mirrors:
        shell: pnpm --filter docs run doc-mirrors:watch
